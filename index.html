<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Subvention - CCMVR</title>
    <meta name="description" content="Portail des demandes de subvention annuelle de fonctionnement pour la Communauté de Communes des Marches du Velay Rochebaron.">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=1.6">
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Splash Screen / Initial Loader -->
        <div id="splash-screen">
            <div class="splash-content">
                <div class="spinner"></div>
                <p>Initialisation de CCMVR Subventions...</p>
            </div>
        </div>

        <!-- Auth View -->
        <main id="auth-container" class="view hidden">
            <div class="glass-card auth-card">
                <div class="auth-header">
                    <div class="logo-container auth-logo-container">CCMVR</div>
                    <h1>Portail Subventions</h1>
                </div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Adresse mail</label>
                        <input type="email" id="email" required placeholder="nom@association.fr">
                    </div>
                    <div class="input-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Se connecter</button>
                    <p class="auth-footer">
                        Nouvelle association ? <a href="#" id="show-register">Créer un compte</a>
                    </p>
                </form>

                <form id="register-form" class="hidden">
                    <div class="form-section">
                        <h4>Identifiants de connexion</h4>
                        <div class="input-group">
                            <label for="reg-email">Email de l'association (sert d'identifiant)</label>
                            <input type="email" id="reg-email" required placeholder="contact@asso.fr">
                        </div>
                        <div class="grid-2">
                            <div class="input-group">
                                <label for="reg-password">Mot de passe</label>
                                <input type="password" id="reg-password" required placeholder="••••••••">
                            </div>
                            <div class="input-group">
                                <label for="reg-confirm-password">Confirmation</label>
                                <input type="password" id="reg-confirm-password" required placeholder="••••••••">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Informations Administratives</h4>
                        <div class="input-group">
                            <label for="reg-assoc-name">Nom complet de l'association</label>
                            <input type="text" id="reg-assoc-name" required placeholder="Ex: Club Sportif ...">
                        </div>
                        <div class="grid-2">
                            <div class="input-group">
                                <label for="reg-rna">Numéro RNA</label>
                                <input type="text" id="reg-rna" required placeholder="W000000000">
                            </div>
                            <div class="input-group">
                                <label for="reg-creation-date">Date de création</label>
                                <input type="date" id="reg-creation-date" required>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="input-group">
                                <label for="reg-siren">Numéro SIREN</label>
                                <input type="text" id="reg-siren" required placeholder="9 chiffres">
                            </div>
                            <div class="input-group">
                                <label for="reg-siret">Numéro SIRET</label>
                                <input type="text" id="reg-siret" required placeholder="14 chiffres">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Gouvernance & Statuts</h4>
                        <div class="input-group">
                            <label for="reg-declarant">Nom complet du déclarant</label>
                            <input type="text" id="reg-declarant" required placeholder="Prénom NOM">
                        </div>
                        <div class="input-group">
                            <label for="reg-leaders">Liste des dirigeants (Bureau)</label>
                            <textarea id="reg-leaders" rows="3" required placeholder="Président: ..., Trésorier: ..., etc."></textarea>
                        </div>
                        <div class="input-group">
                            <label for="reg-statutes">Texte des statuts (Copie brute)</label>
                            <textarea id="reg-statutes" rows="4" required placeholder="Collez ici le texte de vos statuts..."></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Coordonnées de contact</h4>
                        <div class="grid-2">
                            <div class="input-group">
                                <label for="reg-contact-email">Email de contact public</label>
                                <input type="email" id="reg-contact-email" required placeholder="asso@exemple.fr">
                            </div>
                            <div class="input-group">
                                <label for="reg-contact-phone">Numéro de contact</label>
                                <input type="tel" id="reg-contact-phone" required placeholder="06 00 00 00 00">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Créer le compte association</button>
                    <p class="auth-footer">
                        Déjà un compte ? <a href="#" id="show-login">Se connecter</a>
                    </p>
                </form>
            </div>
        </main>

        <!-- App View -->
        <div id="app-content" class="view hidden">
            <header class="main-header">
                <div class="header-left">
                    <span class="badge" id="user-role">Association</span>
                    <h2 id="org-name">Chargement...</h2>
                </div>
                <div class="header-right">
                    <button id="logout-btn" class="btn btn-icon"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="main-layout">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <div class="logo-container">CCMVR</div>
                    </div>
                    <nav id="main-nav">
                        <button class="nav-item active" data-view="dashboard">
                            <i class="fas fa-home"></i> <span>Tableau de bord</span>
                        </button>
                        <button class="nav-item" data-view="application" id="nav-new-app">
                            <i class="fas fa-file-invoice-dollar"></i> <span>Nouvelle demande</span>
                        </button>
                        <button class="nav-item" data-view="history">
                            <i class="fas fa-history"></i> <span>Historique</span>
                        </button>
                        <button class="nav-item" data-view="profile">
                            <i class="fas fa-id-card"></i> <span>Mon Profil</span>
                        </button>
                        <!-- Admin Only -->
                        <div id="admin-menu" class="hidden">
                            <hr>
                            <button class="nav-item" data-view="admin-dashboard">
                                <i class="fas fa-users-cog"></i> <span>Gestion Admin</span>
                            </button>
                        </div>
                    </nav>
                </aside>

                <main id="content-area">
                    <!-- Dynamic fragments will be loaded here -->
                </main>
            </div>
        </div>

        <!-- Notification System -->
        <div id="notification-container"></div>
        
        <div id="global-loader" class="hidden">
            <div class="spinner"></div>
        </div>
        
        <!-- Version Info -->
        <div id="github-version" class="github-version"></div>
    </div>

    <!-- Scripts Injection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/config.js?v=1.6"></script>
    <script src="js/supabase-client.js?v=1.6"></script>
    <script src="js/logo-data.js?v=1.6"></script>
    <script src="js/auth.js?v=1.6"></script>
    <script src="js/ui.js?v=1.6"></script>
    <script src="js/form.js?v=1.6"></script>
    <script src="js/admin.js?v=1.6"></script>
    <script src="js/pdf.js?v=1.6"></script>
    <script src="js/main.js?v=1.6"></script>
</body>
</html>
